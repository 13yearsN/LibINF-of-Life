<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LibINF of Life</title>
    <style>
        body {
            background: #1a0f05;
            color: #e0cda9;
            font-family: 'Segoe UI', 'Noto Sans', monospace;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            position: relative;
            min-height: 100vh;
        }
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.8) 100%);
            pointer-events: none;
            z-index: 999;
        }
        .app-wrap {
            background: #2c190b;
            border: 3px solid #4a2f16;
            border-radius: 8px;
            padding: 15px;
            width: 95%;
            max-width: 1200px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            position: relative;
            z-index: 1;
        }
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
        .lang-panel { display: flex; gap: 8px; }
        .lang-btn {
            background: #120a04;
            border: 1px solid #6b4421;
            color: #ffb366;
            padding: 4px 8px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .lang-btn.active { background: #ffb366; color: #1a0f05; border-color: #fff; }
        .search-bar { display: flex; gap: 8px; flex: 1; min-width: 250px; }
        .search-bar input {
            flex: 1;
            background: #120a04;
            border: 1px solid #6b4421;
            color: #fff;
            padding: 8px 12px;
            font-family: inherit;
            font-size: 13px;
            border-radius: 4px;
            outline: none;
        }
        .search-bar input:focus { border-color: #ffb366; }
        .coord-search {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .coord-search input {
            width: 80px;
            background: #120a04;
            border: 1px solid #6b4421;
            color: #fff;
            padding: 6px 8px;
            font-family: inherit;
            font-size: 12px;
            border-radius: 4px;
            outline: none;
        }
        .coord-search input:focus { border-color: #ffb366; }
        .coord-search label {
            font-size: 11px;
            color: #ffb366;
            margin-right: 2px;
        }
        h1 {
            text-align: center;
            margin: 0 0 5px;
            font-size: 28px;
            letter-spacing: 1px;
            color: #ffd966;
            text-shadow: 0 0 10px #ffb366, 0 0 20px #ffb366;
            font-weight: bold;
            text-transform: uppercase;
        }
        .book-counter {
            text-align: center;
            font-size: 13px;
            color: #a08060;
            margin: 0 0 15px;
            font-style: italic;
            text-shadow: 0 0 5px #2a1a0a;
        }
        .main-layout { display: grid; grid-template-columns: 1fr 280px; gap: 15px; margin-top: 15px; }
        .shelf-area {
            background: #1f1107;
            border: 2px solid #4a2f16;
            border-radius: 6px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            max-height: 75vh;
            min-height: 400px;
        }
        .shelf-block {
            margin-bottom: 25px;
            border-bottom: 1px dashed #3d230d;
            padding-bottom: 15px;
        }
        .shelf-block:last-child { border-bottom: none; margin-bottom: 0; }
        .shelf-label {
            font-size: 11px;
            color: #ffb366;
            margin-bottom: 6px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .shelf {
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
            width: 100%;
            min-height: 180px;
            border-bottom: 14px solid #3d230d;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: inset 0 -8px 15px rgba(0, 0, 0, 0.6);
            padding: 0 10px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            border-radius: 2px;
            overflow: hidden;
        }
        .shelf:hover {
            box-shadow: inset 0 -8px 20px rgba(0, 0, 0, 0.8), 0 0 25px rgba(255, 180, 100, 0.25);
            background: rgba(255, 180, 100, 0.06);
        }
        .slot {
            width: 22px;
            min-width: 22px;
            height: 160px;
            margin-right: 4px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            border-radius: 3px 3px 0 0;
            cursor: pointer;
            position: relative;
            transition: transform 0.15s, background 0.2s;
            flex-shrink: 0;
        }
        .slot:last-child { margin-right: 0; }
        .slot.empty {
            background: transparent;
        }
        .slot.empty:hover {
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 6px rgba(255, 200, 100, 0.3);
        }
        .book {
            width: 100%;
            height: 100%;
            border-radius: 3px 3px 0 0;
            box-shadow: inset -3px 0 5px rgba(0, 0, 0, 0.5), 2px 0 5px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .book:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.7), 0 0 15px rgba(255, 200, 100, 0.4);
        }
        .spine-text {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            font-size: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            box-sizing: border-box;
            padding: 12px 0;
            color: rgba(255, 255, 255, 0.9);
            font-weight: bold;
            letter-spacing: 0.5px;
            pointer-events: none;
            text-transform: uppercase;
        }
        .cabinet-area {
            background: #120a04;
            border: 2px solid #6b4421;
            border-radius: 6px;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }
        .cabinet-title {
            font-size: 12px;
            text-transform: uppercase;
            color: #ffb366;
            margin-bottom: 10px;
            text-align: center;
            font-weight: bold;
            border-bottom: 1px dashed #6b4421;
            padding-bottom: 5px;
        }
        .cabinet-grid {
            display: flex;
            flex-direction: column;
            gap: 5px;
            overflow-y: auto;
            padding-right: 5px;
            flex: 1;
            max-height: 70vh;
        }
        .cabinet-cell {
            background: #241409;
            border: 1px solid #4a2f16;
            padding: 8px 6px;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            color: #8c582c;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 32px;
        }
        .cabinet-cell:hover {
            background: #3d230d;
            color: #e0cda9;
            border-color: #ffb366;
            box-shadow: 0 0 8px rgba(255, 180, 100, 0.3);
        }
        .cabinet-cell.active {
            background: #ffb366;
            color: #1a0f05;
            border-color: #fff;
            font-weight: bold;
            box-shadow: 0 0 12px rgba(255, 179, 102, 0.6);
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .book-ui {
            background: #1c140e;
            color: #e6dac3;
            width: 92%;
            max-width: 520px;
            max-height: 80vh;
            border: 2px solid #ffb366;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
            overflow-y: auto;
        }
        .close {
            position: absolute;
            top: 8px;
            right: 12px;
            font-size: 24px;
            cursor: pointer;
            color: #ff5555;
            font-weight: bold;
            transition: 0.2s;
        }
        .close:hover { color: #ff8888; text-shadow: 0 0 6px #ff0000; }
        .b-meta {
            font-size: 13px;
            color: #a89578;
            border-bottom: 1px solid #3d230d;
            padding-bottom: 10px;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .page-content {
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
            white-space: pre-wrap;
            background: #0d0703;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #3d230d;
            min-height: 150px;
            position: relative;
        }
        .page-content.fading { animation: fadeOut 0.15s forwards; }
        .page-content.showing { animation: fadeIn 0.3s forwards; }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .page-navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }
        .page-btn {
            background: #241409;
            border: 1px solid #6b4421;
            color: #ffb366;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 4px; color: #ffb366; font-size: 12px; }
        .form-group input, .form-group textarea {
            width: 100%;
            background: #120a04;
            border: 1px solid #6b4421;
            color: #fff;
            padding: 10px;
            font-family: inherit;
            font-size: 14px;
            border-radius: 4px;
            outline: none;
            box-sizing: border-box;
        }
        .form-group textarea { resize: vertical; min-height: 120px; }
        .color-picker-wrapper { display: flex; align-items: center; gap: 10px; }
        .color-picker-btn {
            background: #241409;
            border: 1px solid #6b4421;
            color: #ffb366;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .color-preview {
            width: 24px;
            height: 24px;
            border-radius: 3px;
            border: 1px solid #6b4421;
        }
        .btn {
            cursor: pointer;
            color: #ffb366;
            user-select: none;
            padding: 8px 16px;
            border: 1px solid #6b4421;
            border-radius: 4px;
            background: #241409;
            font-weight: bold;
            transition: 0.2s;
            font-size: 13px;
        }
        .btn:hover {
            background: #3d230d;
            border-color: #ffb366;
            box-shadow: 0 0 8px rgba(255, 180, 100, 0.3);
        }
        .btn-primary {
            background: #ffb366;
            color: #1a0f05;
            border-color: #fff;
            margin-top: 10px;
        }
        .btn-primary:hover { background: #ffc480; }
        .search-results { margin-top: 8px; max-height: 200px; overflow-y: auto; }
        .search-result-item {
            padding: 6px 8px;
            cursor: pointer;
            border-bottom: 1px solid #3d230d;
        }
        .search-result-item:hover { background: #3d230d; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0d0703; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #4a2f16; border-radius: 4px; border: 1px solid #2c190b; }
        ::-webkit-scrollbar-thumb:hover { background: #6b4421; }
    </style>
</head>
<body>
    <div class="app-wrap">
        <div class="top-bar">
            <div class="lang-panel">
                <button class="lang-btn active" id="btnRu" onclick="setLanguage('ru')">RU</button>
                <button class="lang-btn" id="btnEn" onclick="setLanguage('en')">EN</button>
            </div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Поиск по тексту или автору...">
                <button class="btn" onclick="performSearch()">🔍</button>
            </div>
        </div>
        <div class="coord-search">
            <label>Шкаф</label>
            <input type="number" id="cabinetCoord" placeholder="270" min="1">
            <label>Полка</label>
            <input type="number" id="shelfCoord" placeholder="1" min="1">
            <label>Слот</label>
            <input type="number" id="slotCoord" placeholder="5" min="1">
            <button class="btn" onclick="navigateToCoords()">Перейти к книге</button>
        </div>
        <h1>LibINF of Life</h1>
        <div class="book-counter" id="bookCounter">Всего книг в вашем архиве: 0</div>

        <div class="main-layout" id="mainLayout">
            <div class="shelf-area" id="shelfArea">
                <div style="color:#8c582c; text-align:center; padding:40px;">Выберите шкаф справа</div>
            </div>
            <div class="cabinet-area">
                <div class="cabinet-title" id="cabinetTitle">Шкафы</div>
                <div class="cabinet-grid" id="cabinetGrid"></div>
            </div>
        </div>
    </div>

    <div class="overlay" id="readerOverlay">
        <div class="book-ui" id="bookModal">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalContent"></div>
        </div>
    </div>

    <input type="color" id="hiddenColorInput" style="position:absolute; opacity:0; pointer-events:none;">

    <script>
        (function() {
            const SHELVES_PER_CABINET = 10;
            const CABINETS_PER_PAGE = 30;

            let currentLanguage = 'ru';
            let activeCabinetIdx = -1;
            let totalCabinetsLoaded = 0;
            let loadedBooks = {};
            let currentSlotsPerShelf = 20;

            const LANG = {
                ru: {
                    cabinetTitle: 'Шкафы', shelfLabel: 'Полка №', cabinetLabel: 'Шкаф #',
                    selectCabinet: 'Выберите шкаф справа',
                    emptyShelf: 'Эта полка пуста. Оставьте свой след в истории LibINF of Life.',
                    author: 'Автор', text: 'Текст книги', save: 'Поставить книгу на полку',
                    readTitle: 'Книга', close: 'Закрыть книгу', colorLabel: 'Цвет обложки',
                    counterText: 'Всего книг в вашем архиве: ',
                    searchPlaceholder: 'Поиск по тексту или автору...',
                    page: 'Страница', of: 'из', next: 'Вперед', prev: 'Назад',
                    newPage: '➕ Страница', chooseColor: '🎨 Выбрать цвет обложки',
                    coordTitle: 'Перейти по координатам',
                    coordCabinet: 'Шкаф', coordShelf: 'Полка', coordSlot: 'Слот',
                    coordButton: 'Перейти к книге'
                },
                en: {
                    cabinetTitle: 'Cabinets', shelfLabel: 'Shelf №', cabinetLabel: 'Cabinet #',
                    selectCabinet: 'Select a cabinet on the right',
                    emptyShelf: 'This shelf is empty. Leave your mark in LibINF of Life.',
                    author: 'Author', text: 'Book text', save: 'Place book on shelf',
                    readTitle: 'Book', close: 'Close book', colorLabel: 'Cover color',
                    counterText: 'Total books in your archive: ',
                    searchPlaceholder: 'Search by text or author...',
                    page: 'Page', of: 'of', next: 'Next', prev: 'Prev',
                    newPage: '➕ Page', chooseColor: '🎨 Choose cover color',
                    coordTitle: 'Go to coordinates',
                    coordCabinet: 'Cabinet', coordShelf: 'Shelf', coordSlot: 'Slot',
                    coordButton: 'Go to book'
                }
            };

            function loadAllBooks() {
                loadedBooks = {};
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key.startsWith('cabinet_')) {
                        try { loadedBooks[key] = JSON.parse(localStorage.getItem(key)); } catch(e) {}
                    }
                }
                updateBookCounter();
            }

            function saveBook(cabinetIdx, shelfIdx, slotIdx, data) {
                const key = `cabinet_${cabinetIdx}_shelf_${shelfIdx}_slot_${slotIdx}`;
                loadedBooks[key] = data;
                localStorage.setItem(key, JSON.stringify(data));
                updateBookCounter();
            }

            function getBook(cabinetIdx, shelfIdx, slotIdx) {
                const key = `cabinet_${cabinetIdx}_shelf_${shelfIdx}_slot_${slotIdx}`;
                return loadedBooks[key] || null;
            }

            function updateBookCounter() {
                document.getElementById('bookCounter').textContent = 
                    LANG[currentLanguage].counterText + Object.keys(loadedBooks).length;
            }

            function renderCabinetList() {
                const grid = document.getElementById('cabinetGrid');
                grid.innerHTML = '';
                for (let i = 0; i < totalCabinetsLoaded; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cabinet-cell' + (i === activeCabinetIdx ? ' active' : '');
                    cell.textContent = `${LANG[currentLanguage].cabinetLabel}${i + 1}`;
                    cell.addEventListener('click', (() => {
                        const idx = i;
                        return () => {
                            activeCabinetIdx = idx;
                            renderCabinet(idx);
                            document.querySelectorAll('.cabinet-cell').forEach((c, j) => c.classList.toggle('active', j === idx));
                        };
                    })());
                    grid.appendChild(cell);
                }
            }

            function renderCabinet(cabinetIdx) {
                const area = document.getElementById('shelfArea');
                area.innerHTML = '';
                const shelfAreaWidth = area.clientWidth;
                const innerWidth = shelfAreaWidth - 20;
                let slotsCount = Math.round((innerWidth + 4) / 26);
                if (slotsCount < 1) slotsCount = 1;
                currentSlotsPerShelf = slotsCount;

                for (let sIdx = 0; sIdx < SHELVES_PER_CABINET; sIdx++) {
                    const block = document.createElement('div');
                    block.className = 'shelf-block';
                    block.id = `shelf-${cabinetIdx}-${sIdx}`;
                    const label = document.createElement('div');
                    label.className = 'shelf-label';
                    label.textContent = `${LANG[currentLanguage].shelfLabel}${sIdx + 1}`;
                    block.appendChild(label);

                    const shelfDiv = document.createElement('div');
                    shelfDiv.className = 'shelf';
                    for (let slotIdx = 0; slotIdx < slotsCount; slotIdx++) {
                        const bookData = getBook(cabinetIdx, sIdx, slotIdx);
                        const slotEl = document.createElement('div');
                        slotEl.className = 'slot' + (bookData ? '' : ' empty');
                        if (bookData) {
                            const bookEl = document.createElement('div');
                            bookEl.className = 'book';
                            bookEl.style.backgroundColor = bookData.color || '#8b5a2b';
                            bookEl.innerHTML = `<div class="spine-text">${bookData.author || 'Аноним'}</div>`;
                            bookEl.addEventListener('click', (e) => {
                                e.stopPropagation();
                                openReader(cabinetIdx, sIdx, slotIdx, bookData);
                            });
                            slotEl.appendChild(bookEl);
                        } else {
                            slotEl.addEventListener('click', () => {
                                openCreator(cabinetIdx, sIdx, slotIdx);
                            });
                        }
                        shelfDiv.appendChild(slotEl);
                    }
                    block.appendChild(shelfDiv);
                    area.appendChild(block);
                }
            }

            function openCreator(cabinetIdx, shelfIdx, slotIdx) {
                const content = document.getElementById('modalContent');
                let pages = [''];
                let currentPage = 0;
                let selectedColor = '#b22222';
                let savedAuthor = '';

                function renderCreator() {
                    content.innerHTML = `
                        <h3 style="color:#ffb366; margin-top:0;">${LANG[currentLanguage].emptyShelf}</h3>
                        <div class="form-group">
                            <label>${LANG[currentLanguage].author}</label>
                            <input type="text" id="inputAuthor" placeholder="${LANG[currentLanguage].author}" value="${savedAuthor}">
                        </div>
                        <div class="form-group">
                            <label>${LANG[currentLanguage].colorLabel}</label>
                            <div class="color-picker-wrapper">
                                <button class="color-picker-btn" id="colorPickerBtn">${LANG[currentLanguage].chooseColor}</button>
                                <div class="color-preview" id="colorPreview" style="background:${selectedColor};"></div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>${LANG[currentLanguage].page} ${currentPage+1} ${LANG[currentLanguage].of} ${pages.length}</label>
                            <textarea id="pageTextarea" style="min-height:150px;">${pages[currentPage]}</textarea>
                        </div>
                        <div class="page-navigation">
                            <button class="page-btn" id="prevPageBtn" ${currentPage===0?'disabled':''}>${LANG[currentLanguage].prev}</button>
                            <button class="page-btn" id="addPageBtn">${LANG[currentLanguage].newPage}</button>
                            <button class="page-btn" id="nextPageBtn" ${currentPage===pages.length-1?'disabled':''}>${LANG[currentLanguage].next}</button>
                        </div>
                        <button class="btn btn-primary" id="saveBookBtn">${LANG[currentLanguage].save}</button>
                    `;

                    const textarea = document.getElementById('pageTextarea');
                    document.getElementById('colorPickerBtn').addEventListener('click', () => {
                        document.getElementById('hiddenColorInput').click();
                    });
                    document.getElementById('hiddenColorInput').oninput = function() {
                        selectedColor = this.value;
                        document.getElementById('colorPreview').style.background = selectedColor;
                    };

                    function saveCurrentPageAndNavigate(newPage) {
                        pages[currentPage] = textarea.value;
                        savedAuthor = document.getElementById('inputAuthor').value.trim();
                        currentPage = newPage;
                        renderCreator();
                    }

                    document.getElementById('prevPageBtn').addEventListener('click', () => {
                        if (currentPage > 0) saveCurrentPageAndNavigate(currentPage - 1);
                    });
                    document.getElementById('nextPageBtn').addEventListener('click', () => {
                        if (currentPage < pages.length - 1) saveCurrentPageAndNavigate(currentPage + 1);
                    });
                    document.getElementById('addPageBtn').addEventListener('click', () => {
                        pages[currentPage] = textarea.value;
                        pages.splice(currentPage + 1, 0, '');
                        savedAuthor = document.getElementById('inputAuthor').value.trim();
                        currentPage++;
                        renderCreator();
                    });

                    document.getElementById('saveBookBtn').addEventListener('click', () => {
                        pages[currentPage] = textarea.value;
                        while (pages.length > 1 && pages[pages.length-1].trim() === '') pages.pop();
                        const fullText = pages.join(' ');
                        if (fullText.trim() === '') return alert('Текст не может быть пустым');
                        savedAuthor = document.getElementById('inputAuthor').value.trim() || 'Аноним';
                        const now = new Date();
                        const dateStr = `${String(now.getDate()).padStart(2,'0')}.${String(now.getMonth()+1).padStart(2,'0')}.${now.getFullYear()}`;
                        saveBook(cabinetIdx, shelfIdx, slotIdx, {
                            author: savedAuthor,
                            date: dateStr,
                            pages,
                            color: selectedColor
                        });
                        closeModal();
                        renderCabinet(cabinetIdx);
                    });
                }

                renderCreator();
                document.getElementById('readerOverlay').style.display = 'flex';
            }

            function openReader(cabinetIdx, shelfIdx, slotIdx, bookData) {
                let pages = bookData.pages || (bookData.text ? [bookData.text] : ['']);
                let currentPage = 0;
                const content = document.getElementById('modalContent');

                function renderReader() {
                    content.innerHTML = `
                        <div class="b-meta">
                            <b>${LANG[currentLanguage].readTitle}</b> ${LANG[currentLanguage].shelfLabel}${shelfIdx+1} | ${LANG[currentLanguage].cabinetLabel}${cabinetIdx+1}<br>
                            ${LANG[currentLanguage].author}: ${bookData.author || 'Аноним'} | ${bookData.date || ''}
                        </div>
                        <div class="page-content" id="readerPageContent">${pages[currentPage]}</div>
                        <div class="page-navigation">
                            <button class="page-btn" id="prevPageBtn" ${currentPage===0?'disabled':''}>${LANG[currentLanguage].prev}</button>
                            <span>${LANG[currentLanguage].page} ${currentPage+1} ${LANG[currentLanguage].of} ${pages.length}</span>
                            <button class="page-btn" id="nextPageBtn" ${currentPage===pages.length-1?'disabled':''}>${LANG[currentLanguage].next}</button>
                        </div>
                        <button class="btn" style="margin-top:15px;" onclick="closeModal()">${LANG[currentLanguage].close}</button>
                    `;

                    function animatePageChange(newPage) {
                        const pageDiv = document.getElementById('readerPageContent');
                        if (!pageDiv) return;
                        pageDiv.classList.add('fading');
                        setTimeout(() => {
                            currentPage = newPage;
                            renderReader();
                            const newPageDiv = document.getElementById('readerPageContent');
                            if (newPageDiv) newPageDiv.classList.add('showing');
                        }, 150);
                    }

                    document.getElementById('prevPageBtn').addEventListener('click', () => {
                        if (currentPage > 0) animatePageChange(currentPage - 1);
                    });
                    document.getElementById('nextPageBtn').addEventListener('click', () => {
                        if (currentPage < pages.length - 1) animatePageChange(currentPage + 1);
                    });
                }

                renderReader();
                document.getElementById('readerOverlay').style.display = 'flex';
            }

            window.closeModal = function() { document.getElementById('readerOverlay').style.display = 'none'; };

            window.navigateToCoords = function() {
                const cabinetInput = document.getElementById('cabinetCoord');
                const shelfInput = document.getElementById('shelfCoord');
                const slotInput = document.getElementById('slotCoord');
                const cabinetVal = parseInt(cabinetInput.value);
                const shelfVal = parseInt(shelfInput.value);
                const slotVal = parseInt(slotInput.value);
                if (isNaN(cabinetVal) || isNaN(shelfVal) || isNaN(slotVal)) {
                    alert('Пожалуйста, заполните все три поля числами.');
                    return;
                }
                const cabinetIdx = cabinetVal - 1;
                const shelfIdx = shelfVal - 1;
                const slotIdx = slotVal - 1;

                if (slotIdx < 0 || slotIdx >= currentSlotsPerShelf) {
                    alert(`Номер слота должен быть от 1 до ${currentSlotsPerShelf}.`);
                    return;
                }

                const book = getBook(cabinetIdx, shelfIdx, slotIdx);
                
                if (activeCabinetIdx !== cabinetIdx) {
                    activeCabinetIdx = cabinetIdx;
                    if (activeCabinetIdx >= totalCabinetsLoaded) {
                        totalCabinetsLoaded = activeCabinetIdx + CABINETS_PER_PAGE;
                        renderCabinetList();
                    }
                    renderCabinet(cabinetIdx);
                    document.querySelectorAll('.cabinet-cell').forEach((c, i) => c.classList.toggle('active', i === cabinetIdx));
                }
                setTimeout(() => {
                    const targetBlock = document.getElementById(`shelf-${cabinetIdx}-${shelfIdx}`);
                    if (targetBlock) {
                        targetBlock.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }, 100);

                if (book) {
                    setTimeout(() => {
                        openReader(cabinetIdx, shelfIdx, slotIdx, book);
                    }, 200);
                }
            };

            document.addEventListener('DOMContentLoaded', function() {
                const coordInputs = ['cabinetCoord', 'shelfCoord', 'slotCoord'];
                coordInputs.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) {
                        el.addEventListener('keypress', function(e) {
                            if (e.key === 'Enter') navigateToCoords();
                        });
                    }
                });
            });

            window.performSearch = function() {
                const query = document.getElementById('searchInput').value.trim();
                if (!query) return;

                const lowerQuery = query.toLowerCase();
                const results = [];
                for (const [key, book] of Object.entries(loadedBooks)) {
                    const fullText = (book.pages || [book.text || '']).join(' ');
                    if ((book.author && book.author.toLowerCase().includes(lowerQuery)) || fullText.toLowerCase().includes(lowerQuery)) {
                        const parts = key.split('_');
                        results.push({ cabinet: parseInt(parts[1]), shelf: parseInt(parts[3]), slot: parseInt(parts[5]), book });
                    }
                }
                if (results.length === 0) {
                    alert('Ничего не найдено');
                    return;
                }
                const content = document.getElementById('modalContent');
                content.innerHTML = `<h3>Результаты поиска (${results.length})</h3><div class="search-results">` +
                    results.map((r,i) => `<div class="search-result-item" data-index="${i}"><b>${r.book.author||'Аноним'}</b> – Шкаф ${r.cabinet+1}, Полка ${r.shelf+1}, Слот ${r.slot+1}</div>`).join('') +
                    '</div><button class="btn" style="margin-top:10px;" onclick="closeModal()">Закрыть</button>';
                document.getElementById('readerOverlay').style.display = 'flex';
                content.querySelectorAll('.search-result-item').forEach(el => {
                    el.addEventListener('click', () => {
                        const idx = parseInt(el.dataset.index);
                        const res = results[idx];
                        closeModal();
                        if (activeCabinetIdx !== res.cabinet) {
                            activeCabinetIdx = res.cabinet;
                            if (activeCabinetIdx >= totalCabinetsLoaded) {
                                totalCabinetsLoaded = activeCabinetIdx + CABINETS_PER_PAGE;
                                renderCabinetList();
                            }
                            renderCabinet(res.cabinet);
                            document.querySelectorAll('.cabinet-cell').forEach((c,i) => c.classList.toggle('active', i===res.cabinet));
                        }
                        const activeCell = document.querySelector('.cabinet-cell.active');
                        if (activeCell) activeCell.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        const book = getBook(res.cabinet, res.shelf, res.slot);
                        if (book) openReader(res.cabinet, res.shelf, res.slot, book);
                    });
                });
            };

            document.addEventListener('DOMContentLoaded', function() {
                const searchInput = document.getElementById('searchInput');
                searchInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') performSearch();
                });
            });

            function setupInfiniteScroll() {
                document.getElementById('cabinetGrid').addEventListener('scroll', function() {
                    if (this.scrollTop + this.clientHeight >= this.scrollHeight - 10) {
                        totalCabinetsLoaded += CABINETS_PER_PAGE;
                        renderCabinetList();
                    }
                });
            }

            window.setLanguage = function(lang) {
                currentLanguage = lang;
                document.getElementById('btnRu').classList.toggle('active', lang==='ru');
                document.getElementById('btnEn').classList.toggle('active', lang==='en');
                document.getElementById('cabinetTitle').textContent = LANG[lang].cabinetTitle;
                document.getElementById('searchInput').placeholder = LANG[lang].searchPlaceholder;
                updateBookCounter();
                if (activeCabinetIdx >= 0) renderCabinet(activeCabinetIdx);
                else document.getElementById('shelfArea').innerHTML = `<div style="color:#8c582c; text-align:center; padding:40px;">${LANG[lang].selectCabinet}</div>`;
                renderCabinetList();
            };

            loadAllBooks();
            totalCabinetsLoaded = CABINETS_PER_PAGE;
            renderCabinetList();
            setupInfiniteScroll();
            document.getElementById('mainLayout').style.display = 'grid';
            if (totalCabinetsLoaded > 0) {
                activeCabinetIdx = 0;
                renderCabinet(0);
                document.querySelector('.cabinet-cell')?.classList.add('active');
            }
            document.getElementById('searchInput').placeholder = LANG[currentLanguage].searchPlaceholder;
        })();
    </script>
</body>
</html>
